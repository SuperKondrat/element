services:
  db:
    image: postgres:16-alpine
    # POSTGRES_DB/USER/PASSWORD приходят из env_file (config/app.env + .env)
    # напрямую как переменные окружения контейнера — НЕ дублируем их здесь
    # через environment: с ${VAR}. Docker Compose делает ${VAR}-подстановку
    # в самом YAML только из корневого .env, а не из env_file: — если
    # продублировать так config/app.env-переменные, они превратятся в
    # пустые строки и молча перетрут то, что дал env_file (ровно та
    # ловушка с "задвоенными значениями", о которой предупреждает ТЗ).
    env_file:
      - config/app.env
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR (не ${VAR}) — чтобы подстановку делал shell внутри контейнера
      # из его реального окружения, а не Compose на этапе чтения YAML.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - config/app.env
      - .env
    environment:
      POSTGRES_PORT: 5432
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./feeds:/feeds:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}
    env_file:
      - config/app.env
      - .env
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      - backend

volumes:
  db_data:
